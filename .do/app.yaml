# DigitalOcean App Platform specification
# Deployed by GitHub Actions (.github/workflows/ci-cd.yml) — deploy_on_push is off
# so CI owns releases (avoids double builds).
name: shadow-llm-evaluator
region: nyc

services:
  - name: api
    github:
      repo: hkumar09-dev/shadow-llm-evaluator
      branch: main
      deploy_on_push: false
    dockerfile_path: Dockerfile
    source_dir: /
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /healthz
      initial_delay_seconds: 10
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 6
    envs:
      - key: APP_ENV
        scope: RUN_TIME
        value: "prod"
      - key: ENV_DIR
        scope: RUN_TIME
        value: "env"
      - key: ADDR
        scope: RUN_TIME
        value: ":8080"
      - key: GIN_MODE
        scope: RUN_TIME
        value: "release"
      - key: LOG_LEVEL
        scope: RUN_TIME
        value: "info"
      - key: PRIMARY_LLM_URL
        scope: RUN_TIME
        value: "https://inference.do-ai.run/v1/chat/completions"
      - key: CANDIDATE_LLM_URL
        scope: RUN_TIME
        value: "https://inference.do-ai.run/v1/chat/completions"
      - key: PRIMARY_MODEL
        scope: RUN_TIME
        value: "router:shadow-mode-llm-evaluator"
      - key: CANDIDATE_MODEL
        scope: RUN_TIME
        value: "router:shadow-mode-llm-evaluator"
      # Injected from GitHub Actions secret MODEL_ACCESS_KEY at deploy time
      - key: MODEL_ACCESS_KEY
        scope: RUN_TIME
        type: SECRET
        value: ${MODEL_ACCESS_KEY}
      - key: SHADOW_TIMEOUT_SECONDS
        scope: RUN_TIME
        value: "30"
      - key: SHADOW_MAX_INFLIGHT
        scope: RUN_TIME
        value: "64"
      - key: HTTP_CLIENT_TIMEOUT_SECONDS
        scope: RUN_TIME
        value: "60"
