# golangci-lint v2 config (required for Go 1.26+)
version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
  settings:
    misspell:
      locale: US

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
